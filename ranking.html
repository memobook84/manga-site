<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="人気漫画 - ATLAS COMIC。今人気の漫画をチェックできます。">

    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Popular - ATLAS COMIC">
    <meta name="twitter:description" content="人気漫画 - ATLAS COMIC。今人気の漫画をチェックできます。">
    <meta name="twitter:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Zilla+Slab:wght@400;600;700&family=Michroma&family=Montserrat:wght@700;900&family=Barlow:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="legal.css">
    <link rel="stylesheet" href="ranking.css">
    <script src="manga-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="ranking.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="logo.png" alt="Logo" class="header-logo-img"></a>
            <h1><a href="index.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="home.html" class="nav-link"><i class="ph-bold ph-star" style="font-size:13px"></i>Pickup</a>
                <a href="database.html" class="nav-link"><i class="ph-bold ph-database" style="font-size:13px"></i>Database</a>
                <a href="ranking.html" class="nav-link"><i class="ph-bold ph-trophy" style="font-size:13px"></i>Popular</a>
                <a href="follow.html" class="nav-link follow-link"><i class="ph-bold ph-heart" style="font-size:13px"></i>Favorites</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <section class="page-hero">
        <h2>POPULAR</h2>
        <p>今売れている漫画をランキング形式で紹介</p>
    </section>

    <!-- ランキングページコンテンツ -->
    <main class="ranking-main">

        <div class="ranking-container">
            <!-- JavaScriptで動的に生成 -->
        </div>

        <div class="back-button-container">
            <a href="home.html" class="back-button">← トップページに戻る</a>
        </div>
    </main>


    <!-- サイトフッター -->
    <div class="site-footer">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="footer-sep">|</span>
        <a href="about.html">運営者情報</a>
        <span class="footer-sep">|</span>
        <a href="profile.html">管理人紹介</a>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="/home.html" class="bottom-nav-item" data-page="home">
            <i class="ph-bold ph-star" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/database.html" class="bottom-nav-item" data-page="database">
            <i class="ph-bold ph-database" style="font-size:22px"></i>
            <span>Database</span>
        </a>
        <a href="/ranking.html" class="bottom-nav-item" data-page="ranking">
            <i class="ph-bold ph-trophy" style="font-size:22px"></i>
            <span>Popular</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-bold ph-heart" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html')) ||
                (page === 'database' && path.includes('database')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
<!-- トップへ戻るボタン -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="トップへ戻る">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script>
(function(){
    var btn=document.getElementById('scrollTopBtn');
    if(!btn)return;
    window.addEventListener('scroll',function(){
        btn.classList.toggle('visible',window.scrollY>300);
    });
    btn.addEventListener('click',function(){
        window.scrollTo({top:0,behavior:'smooth'});
    });
})();
</script>
</body>
</html>
