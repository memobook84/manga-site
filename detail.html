<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画詳細 - ATLAS COMIC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="漫画の詳細情報 - ATLAS COMIC。あらすじ・著者・巻一覧をチェックできます。">
    <!-- OGP -->
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="ATLAS COMIC">
    <meta property="og:title" content="漫画詳細 - ATLAS COMIC">
    <meta property="og:description" content="漫画の詳細情報 - ATLAS COMIC。あらすじ・著者・巻一覧をチェックできます。">
    <meta property="og:url" content="https://manga-site-three.vercel.app/detail.html">
    <meta property="og:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="漫画詳細 - ATLAS COMIC">
    <meta name="twitter:description" content="漫画の詳細情報 - ATLAS COMIC。あらすじ・著者・巻一覧をチェックできます。">
    <meta name="twitter:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Michroma&family=Anton&family=Big+Shoulders+Display:wght@900&family=Montserrat:wght@700;900&family=Barlow:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.17.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="legal.css">
    <link rel="stylesheet" href="detail.css">
    <script src="manga-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="detail.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="logo.png" alt="ATLAS COMIC" class="header-logo-img"></a>
            <h1><a href="index.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Pickup</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="database.html" class="nav-link">BASE</a>
                <a href="follow.html" class="nav-link follow-link">Favs</a>
                <button class="nav-menu-btn" id="navMenuBtn"><i class="ti ti-arrow-down-circle-filled"></i></button>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 詳細ページコンテンツ -->
    <main class="detail-main">
        <div class="detail-container">
            <!-- 左側：表紙画像 -->
            <div class="detail-image">
                <div class="detail-cover-frame">
                    <img id="manga-image" src="" alt="漫画の表紙">
                    <button type="button" id="detail-image-badge" class="detail-image-badge" aria-label="動画を見る" hidden><i class="bi bi-collection-play-fill"></i></button>
                </div>
                <button id="follow-button" class="follow-button" aria-label="Favorite">
                    <i class="ph-bold ph-heart follow-icon" style="font-size:16px"></i>
                    <span class="follow-button-text">Favorite</span>
                </button>
            </div>

            <!-- 右側：詳細情報 -->
            <div class="detail-info">
                <h1 id="manga-title" class="detail-title">読み込み中...</h1>
                <div class="detail-author-line"><span id="manga-author">-</span></div>
            </div>
        </div>

        <hr class="detail-divider">

        <!-- メタ情報 -->
        <div class="detail-meta">
            <div class="meta-item">
                <span class="meta-label">出版社</span>
                <span class="meta-dots"></span>
                <span id="manga-publisher" class="meta-value">-</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">レーベル</span>
                <span class="meta-dots"></span>
                <span id="manga-label" class="meta-value">-</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">ジャンル</span>
                <span class="meta-dots"></span>
                <span id="manga-genre" class="meta-value">-</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">全巻数</span>
                <span class="meta-dots"></span>
                <span id="manga-date" class="meta-value">-</span>
            </div>
        </div>

        <hr class="detail-divider">

        <!-- ストーリー -->
        <div class="detail-description">
            <h2>ストーリー</h2>
            <p id="manga-description">読み込み中...</p>
        </div>

        <!-- 各巻セクション -->
        <div class="volumes-section">
            <div class="volumes-header">
                <h2 class="volumes-title">シリーズ一覧</h2>
                <div class="volumes-actions-wrap">
                    <button type="button" id="cart-toggle-btn" class="cart-toggle-btn" aria-label="カートメニューを開く" aria-expanded="false">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </button>
                    <div class="volumes-actions" id="volumes-actions" hidden>
                        <button type="button" id="cart-all-btn" class="cart-btn cart-btn-primary">
                            <i class="ph-bold ph-shopping-cart" style="font-size:14px"></i>
                            <span>全巻カートに入れる</span>
                        </button>
                        <button type="button" id="cart-range-btn" class="cart-btn cart-btn-ghost">
                            <i class="ph-bold ph-funnel" style="font-size:14px"></i>
                            <span>巻を指定</span>
                        </button>
                        <button type="button" class="cart-btn cart-btn-ghost" disabled>
                            <i class="ph-bold ph-bookmark-simple" style="font-size:14px"></i>
                            <span>未購入の巻をカートに入れる</span>
                        </button>
                    </div>
                </div>
            </div>
            <div id="volumes-grid" class="volumes-grid">
                <!-- JavaScriptで動的に生成 -->
            </div>
        </div>

        <!-- 巻指定モーダル -->
        <div id="range-modal" class="range-modal-overlay" role="dialog" aria-modal="true" aria-label="巻を指定">
            <div class="range-modal-content">
                <button type="button" class="range-modal-close" id="range-modal-close" aria-label="閉じる"><i class="ph-bold ph-x"></i></button>
                <h3 class="range-modal-title">巻を指定してカートに入れる</h3>
                <p class="range-modal-sub" id="range-modal-sub"></p>
                <div class="range-modal-row">
                    <label class="range-field">
                        <span>From</span>
                        <input type="number" id="range-from" min="1" value="1" inputmode="numeric">
                    </label>
                    <span class="range-sep">〜</span>
                    <label class="range-field">
                        <span>To</span>
                        <input type="number" id="range-to" min="1" value="1" inputmode="numeric">
                    </label>
                </div>
                <div class="range-keypad" id="range-keypad" aria-label="テンキー">
                    <button type="button" class="keypad-btn" data-key="1">1</button>
                    <button type="button" class="keypad-btn" data-key="2">2</button>
                    <button type="button" class="keypad-btn" data-key="3">3</button>
                    <button type="button" class="keypad-btn" data-key="4">4</button>
                    <button type="button" class="keypad-btn" data-key="5">5</button>
                    <button type="button" class="keypad-btn" data-key="6">6</button>
                    <button type="button" class="keypad-btn" data-key="7">7</button>
                    <button type="button" class="keypad-btn" data-key="8">8</button>
                    <button type="button" class="keypad-btn" data-key="9">9</button>
                    <button type="button" class="keypad-btn keypad-btn-util" data-key="clear">C</button>
                    <button type="button" class="keypad-btn" data-key="0">0</button>
                    <button type="button" class="keypad-btn keypad-btn-util" data-key="back" aria-label="一文字消す"><i class="ph-bold ph-backspace"></i></button>
                </div>
                <button type="button" id="range-submit" class="cart-btn cart-btn-primary range-submit">
                    <i class="ph-bold ph-shopping-cart" style="font-size:14px"></i>
                    <span>この範囲をカートに入れる</span>
                </button>
            </div>
        </div>
    </main>

    <!-- 動画モーダル -->
    <div id="video-modal" class="video-modal-overlay" role="dialog" aria-modal="true" aria-label="動画プレビュー">
        <div class="video-modal-content">
            <button type="button" class="video-modal-close" id="video-modal-close" aria-label="閉じる"><i class="ph-bold ph-x"></i></button>
            <iframe id="video-modal-iframe" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <!-- サイトフッター -->
    <div class="site-footer">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="footer-sep">|</span>
        <a href="about.html">運営者情報</a>
        <span class="footer-sep">|</span>
        <a href="profile.html">管理人紹介</a>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="javascript:history.back()" class="bottom-nav-item" data-page="back">
            <i class="ph-bold ph-arrow-left" style="font-size:22px"></i>
            <span>Back</span>
        </a>
        <a href="/index.html" class="bottom-nav-item" data-page="home">
            <i class="ph-bold ph-fire" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/database.html" class="bottom-nav-item" data-page="database">
            <i class="ph-bold ph-database" style="font-size:22px"></i>
            <span>Database</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-bold ph-butterfly" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
        <a href="/home.html" class="bottom-nav-item" data-page="menu">
            <i class="ph-bold ph-list" style="font-size:22px"></i>
            <span>Menu</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html')) ||
                (page === 'database' && path.includes('database')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'blog' && path.includes('blog')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
    <script src="nav-menu.js"></script>
</body>
</html>
