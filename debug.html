<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Image Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .item { border: 1px solid #ccc; margin: 10px; padding: 10px; display: inline-block; width: 200px; vertical-align: top; }
        .item img { width: 100%; height: 250px; object-fit: contain; background: #f0f0f0; display: block; }
        .status { font-size: 12px; padding: 4px; margin-top: 4px; }
        .ok { background: #d4edda; }
        .fail { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>Image Debug Page</h1>
    <p id="info">Loading...</p>
    <div id="grid"></div>
    <script>
        async function test() {
            const info = document.getElementById('info');
            const grid = document.getElementById('grid');
            try {
                const resp = await fetch('/api/books?genre=001001&hits=30&page=1&sort=sales');
                const data = await resp.json();
                info.textContent = `API returned ${data.items.length} items`;

                data.items.forEach((item, i) => {
                    const div = document.createElement('div');
                    div.className = 'item';

                    const img = document.createElement('img');
                    img.src = item.imageUrl;
                    img.alt = item.title;

                    const status = document.createElement('div');
                    status.className = 'status';
                    status.textContent = 'Loading...';

                    img.onload = () => {
                        status.textContent = `OK: ${img.naturalWidth}x${img.naturalHeight}`;
                        status.className = 'status ok';
                    };
                    img.onerror = () => {
                        status.textContent = `FAIL: ${item.imageUrl.slice(-40)}`;
                        status.className = 'status fail';
                    };

                    const title = document.createElement('div');
                    title.textContent = `${i+1}. ${item.title}`;
                    title.style.cssText = 'font-size:12px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

                    div.appendChild(img);
                    div.appendChild(status);
                    div.appendChild(title);
                    grid.appendChild(div);
                });
            } catch (e) {
                info.textContent = 'Error: ' + e.message;
            }
        }
        test();
    </script>
</body>
</html>
