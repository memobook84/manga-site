<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="home.html" class="header-logo"><img src="logo.png" alt="ATLAS COMIC" class="header-logo-img"></a>
            <h1><a href="home.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Pickup</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="follow.html" class="nav-link follow-link">Favs</a>
                <button class="nav-menu-btn" id="navMenuBtn"><svg viewBox="0 0 320 512" class="nav-caret" aria-hidden="true"><path d="M137.4 374.6c12.5 12.5 32.8 12.5 45.3 0l128-128c9.2-9.2 11.9-22.9 6.9-34.9s-16.6-19.8-29.6-19.8L32 192c-12.9 0-24.6 7.8-29.6 19.8s-2.2 25.7 6.9 34.9l128 128z"/></svg></button>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <section class="page-hero">
        <h2>BLOG</h2>
        <p>テーマ別まとめ・コラム記事</p>
    </section>

    <div class="blog-container" id="blogContainer">
        <!-- blog.js でカテゴリーセクションを動的生成 -->
    </div>

    <!-- サイトフッター -->
    <div class="site-footer">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="footer-sep">|</span>
        <a href="about.html">運営者情報</a>
        <span class="footer-sep">|</span>
        <a href="profile.html">管理人紹介</a>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="javascript:history.back()" class="bottom-nav-item" data-page="back">
            <i class="ph-light ph-arrow-left" style="font-size:22px"></i>
            <span>Back</span>
        </a>
        <a href="/home.html" class="bottom-nav-item" data-page="database">
            <i class="ph-light ph-house" style="font-size:22px"></i>
            <span>Home</span>
        </a>
        <a href="/index.html" class="bottom-nav-item" data-page="home">
            <i class="ph-light ph-fire" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-light ph-butterfly" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
        <a href="/menu.html" class="bottom-nav-item" data-page="menu">
            <i class="ph-light ph-list" style="font-size:22px"></i>
            <span>Menu</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html' || path.includes('home'))) ||
                (page === 'database' && path.includes('database')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'blog' && path.includes('blog')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    // ダークモード
    (function() {
        var isDark = localStorage.getItem('darkMode') === 'true';
        var body = document.body;
        if (isDark) body.classList.add('dark-mode');
    })();
    </script>

    <script>
    // 検索機能
    (function() {
        var searchInput = document.querySelector('.search-box input');
        var searchButton = document.querySelector('.search-box button');
        function doSearch() {
            var keyword = searchInput.value.trim();
            if (keyword) {
                window.location.href = 'home.html?search=' + encodeURIComponent(keyword);
            }
        }
        if (searchButton) searchButton.addEventListener('click', doSearch);
        if (searchInput) searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    })();
    </script>

    <script src="blog.js"></script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
    <script src="swipe-back.js"></script>
    <script src="nav-menu.js"></script>
</body>
</html>
