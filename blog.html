<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark-mode-pending');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - ATLAS COMIC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="漫画のテーマ別まとめ・コラム記事 - ATLAS COMIC Blog。ジャンル特集やランキングなど、漫画をもっと楽しむための読み物をお届けします。">
    <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ATLAS COMIC">
    <meta property="og:title" content="Blog - ATLAS COMIC">
    <meta property="og:description" content="漫画のテーマ別まとめ・コラム記事 - ATLAS COMIC Blog。ジャンル特集やランキングなど、漫画をもっと楽しむための読み物をお届けします。">
    <meta property="og:url" content="https://manga-site-three.vercel.app/blog.html">
    <meta property="og:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Blog - ATLAS COMIC">
    <meta name="twitter:description" content="テーマ別まとめ・コラム記事 - ATLAS COMIC Blog">
    <meta name="twitter:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Zilla+Slab:wght@400;600;700&family=Michroma&family=Montserrat:wght@700;900&family=Barlow:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="legal.css">
    <link rel="stylesheet" href="blog.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="favicon.png" alt="ATLAS COMIC" class="header-logo-img"></a>
            <h1><a href="index.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Pickup</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="database.html" class="nav-link">DB</a>
                <a href="ranking.html" class="nav-link">Popular</a>
                <a href="follow.html" class="nav-link follow-link">Favs</a>
                <a href="profile.html" class="nav-link profile-link">About Me</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <section class="page-hero">
        <h2>BLOG</h2>
        <p>テーマ別まとめ・コラム記事</p>
    </section>

    <div class="blog-container">
        <div class="blog-grid" id="blogGrid">
            <!-- blog.js で動的生成 -->
        </div>
    </div>

    <!-- サイトフッター -->
    <div class="site-footer">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="footer-sep">|</span>
        <a href="about.html">運営者情報</a>
        <span class="footer-sep">|</span>
        <a href="profile.html">管理人紹介</a>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="/home.html" class="bottom-nav-item" data-page="home">
            <i class="ph-bold ph-star" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/blog.html" class="bottom-nav-item" data-page="blog">
            <i class="ph-bold ph-article" style="font-size:22px"></i>
            <span>Blog</span>
        </a>
        <a href="/database.html" class="bottom-nav-item" data-page="database">
            <i class="ph-bold ph-database" style="font-size:22px"></i>
            <span>Database</span>
        </a>
        <a href="/ranking.html" class="bottom-nav-item" data-page="ranking">
            <i class="ph-bold ph-trophy" style="font-size:22px"></i>
            <span>Popular</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-bold ph-heart" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html' || path.includes('home'))) ||
                (page === 'database' && path.includes('database')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'blog' && path.includes('blog')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    // ダークモード
    (function() {
        var isDark = localStorage.getItem('darkMode') === 'true';
        var body = document.body;
        if (isDark) body.classList.add('dark-mode');
    })();
    </script>

    <script>
    // 検索機能
    (function() {
        var searchInput = document.querySelector('.search-box input');
        var searchButton = document.querySelector('.search-box button');
        function doSearch() {
            var keyword = searchInput.value.trim();
            if (keyword) {
                window.location.href = 'database.html?search=' + encodeURIComponent(keyword);
            }
        }
        if (searchButton) searchButton.addEventListener('click', doSearch);
        if (searchInput) searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    })();
    </script>

    <script src="blog.js"></script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
</body>
</html>
