    <link rel="stylesheet" href="home-portal.css">

</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="logo.png" alt="Logo" class="header-logo-img"></a>
            <h1><a href="index.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="home.html" class="nav-link"><i class="ph-bold ph-star" style="font-size:13px"></i>Pickup</a>
                <a href="blog.html" class="nav-link"><i class="ph-bold ph-article" style="font-size:13px"></i>Blog</a>
                <a href="database.html" class="nav-link"><i class="ph-bold ph-database" style="font-size:13px"></i>Database</a>
                <a href="ranking.html" class="nav-link"><i class="ph-bold ph-trophy" style="font-size:13px"></i>Popular</a>
                <a href="follow.html" class="nav-link follow-link"><i class="ph-bold ph-heart" style="font-size:13px"></i>Favorites</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- ポータルメインコンテンツ -->
    <div class="portal-main">
        <!-- ヒーローバナー -->
        <section class="hero-banner">
            <h2>EDITOR'S PICK</h2>
            <p>漫画好きの管理人が厳選した今注目の作品</p>
        </section>

        <!-- ピックアップ -->
        <section class="portal-section">
            <div id="pickup-grid" class="pickup-grid"></div>
        </section>

        <!-- ダークモードトグル -->
        <div class="portal-footer">
            <button id="dark-toggle" class="dark-toggle" aria-label="ダークモード切替">
                <span class="dark-toggle-knob"></span>
            </button>
        </div>
    </div>


    <!-- サイトフッター -->
    <div class="site-footer">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="footer-sep">|</span>
        <a href="about.html">運営者情報</a>
        <span class="footer-sep">|</span>
        <a href="profile.html">管理人紹介</a>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="/home.html" class="bottom-nav-item" data-page="home">
            <i class="ph-bold ph-star" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/blog.html" class="bottom-nav-item" data-page="blog">
            <i class="ph-bold ph-article" style="font-size:22px"></i>
            <span>Blog</span>
        </a>
        <a href="/database.html" class="bottom-nav-item" data-page="database">
            <i class="ph-bold ph-database" style="font-size:22px"></i>
            <span>Database</span>
        </a>
        <a href="/ranking.html" class="bottom-nav-item" data-page="ranking">
            <i class="ph-bold ph-trophy" style="font-size:22px"></i>
            <span>Popular</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-bold ph-heart" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html' || path.includes('home'))) ||
                (page === 'database' && path.includes('database')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'blog' && path.includes('blog')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    // ダークモード
    (function() {
        var isDark = localStorage.getItem('darkMode') === 'true';
        var body = document.body;
        var btn = document.getElementById('dark-toggle');

        if (isDark) body.classList.add('dark-mode');

        btn.addEventListener('click', function() {
            body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', body.classList.contains('dark-mode'));
        });
    })();
    </script>

    <script>
    // 検索機能（ヘッダー検索ボックス）
    (function() {
        var searchInput = document.querySelector('.search-box input');
        var searchButton = document.querySelector('.search-box button');
        function doSearch() {
            var keyword = searchInput.value.trim();
            if (keyword) {
                window.location.href = 'database.html?search=' + encodeURIComponent(keyword);
            }
        }
        if (searchButton) searchButton.addEventListener('click', doSearch);
        if (searchInput) searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
<!-- トップへ戻るボタン -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="トップへ戻る">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script>
(function(){
    var btn=document.getElementById('scrollTopBtn');
    if(!btn)return;
    window.addEventListener('scroll',function(){
        btn.classList.toggle('visible',window.scrollY>300);
    });
    btn.addEventListener('click',function(){
        window.scrollTo({top:0,behavior:'smooth'});
    });
})();
</script>
</body>
</html>
