<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巻詳細 - ATLAS COMIC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="漫画の巻詳細情報 - ATLAS COMIC。あらすじ・価格・購入リンクをチェックできます。">
    <!-- OGP -->
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="ATLAS COMIC">
    <meta property="og:title" content="巻詳細 - ATLAS COMIC">
    <meta property="og:description" content="漫画の巻詳細情報 - ATLAS COMIC。あらすじ・価格・購入リンクをチェックできます。">
    <meta property="og:url" content="https://manga-site-three.vercel.app/volume.html">
    <meta property="og:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="巻詳細 - ATLAS COMIC">
    <meta name="twitter:description" content="漫画の巻詳細情報 - ATLAS COMIC。あらすじ・価格・購入リンクをチェックできます。">
    <meta name="twitter:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Michroma&family=Montserrat:wght@700;900&family=Barlow:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="legal.css">
    <link rel="stylesheet" href="volume.css">
    <script src="manga-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="volume.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="favicon.png" alt="ATLAS COMIC" class="header-logo-img"></a>
            <h1><a href="index.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Pickup</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="database.html" class="nav-link">DB</a>
                <a href="ranking.html" class="nav-link">Popular</a>
                <a href="follow.html" class="nav-link follow-link">Favs</a>
                <a href="profile.html" class="nav-link profile-link">About Me</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 巻詳細ページコンテンツ -->
    <main class="volume-main">
        <div class="volume-container">
            <!-- 左側：表紙画像 -->
            <div class="volume-image-wrap">
                <div class="volume-image">
                    <img id="volume-cover" src="" alt="巻の表紙">
                    <span id="swipe-arrow-prev" class="swipe-arrow swipe-arrow-prev">
                        <i class="ph-bold ph-caret-left" style="font-size:16px"></i>
                    </span>
                    <span id="swipe-arrow-next" class="swipe-arrow swipe-arrow-next">
                        <i class="ph-bold ph-caret-right" style="font-size:16px"></i>
                    </span>
                </div>
                <a href="#" id="buy-amazon" class="buy-button amazon-button" target="_blank">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    Amazonで購入
                </a>
            </div>

            <!-- 右側：詳細情報 -->
            <div class="volume-info-detail">
                <div class="volume-title-row">
                    <h1 id="volume-title" class="volume-title-main">読み込み中...</h1>
                    <span id="volume-number" class="volume-number-display">-</span>
                </div>

                <div class="volume-meta">
                    <div class="meta-item">
                        <span class="meta-label">著者：</span>
                        <a href="#" id="volume-author" class="meta-value author-link">-</a>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">出版社：</span>
                        <span id="volume-publisher" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">レーベル：</span>
                        <span id="volume-label" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">ジャンル：</span>
                        <span id="volume-genre" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">発売日：</span>
                        <span id="volume-date" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">ISBN：</span>
                        <span id="volume-isbn" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">価格：</span>
                        <span id="volume-price" class="meta-value">-</span>
                    </div>
                </div>

                <!-- PC用前後ナビ -->
                <div class="pc-nav-arrows" style="display:none;">
                    <button id="pc-prev-volume" class="pc-nav-arrow" disabled title="前の巻">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button id="pc-next-volume" class="pc-nav-arrow" disabled title="次の巻">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>

            </div>
        </div>

        <!-- ストーリー -->
        <div class="volume-description">
            <h2>ストーリー</h2>
            <p id="volume-synopsis">読み込み中...</p>
        </div>

        <!-- シリーズ一覧 -->
        <div id="series-list-section" class="series-list-section" style="display:none;">
            <h2 class="series-list-title">シリーズ一覧</h2>
            <div id="series-list-grid" class="series-list-grid"></div>
        </div>

        <div class="volume-bottom-section">

            <div class="navigation-buttons">
                <a href="#" id="back-to-series" class="nav-button">← 作品ページに戻る</a>

            </div>
        </div>
    </main>

    <!-- サイトフッター -->
    <div class="site-footer">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="footer-sep">|</span>
        <a href="about.html">運営者情報</a>
        <span class="footer-sep">|</span>
        <a href="profile.html">管理人紹介</a>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="javascript:history.back()" class="bottom-nav-item" data-page="back">
            <i class="ph-bold ph-arrow-left" style="font-size:22px"></i>
            <span>Back</span>
        </a>
        <a href="/index.html" class="bottom-nav-item" data-page="home">
            <i class="ph-bold ph-fire" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/database.html" class="bottom-nav-item" data-page="database">
            <i class="ph-bold ph-database" style="font-size:22px"></i>
            <span>Database</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-bold ph-butterfly" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
        <a href="/home.html" class="bottom-nav-item" data-page="menu">
            <i class="ph-bold ph-list" style="font-size:22px"></i>
            <span>Menu</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html')) ||
                (page === 'database' && path.includes('database')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'blog' && path.includes('blog')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
</body>
</html>
