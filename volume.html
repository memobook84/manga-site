<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巻詳細 - THE MANGA STORE</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="volume.css">
    <script src="manga-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="volume.js"></script>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="logo.png" alt="Logo" class="header-logo-img"></a>
            <h1><a href="index.html" style="color: white; text-decoration: none;">THE MANGA STORE</a></h1>
            <nav class="header-nav">
                <a href="new-releases.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>New Release</a>
                <a href="follow.html" class="nav-link follow-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Follow</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 巻詳細ページコンテンツ -->
    <main class="volume-main">
        <div class="volume-container">
            <!-- 左側：表紙画像 -->
            <div class="volume-image">
                <img id="volume-cover" src="" alt="巻の表紙">
            </div>

            <!-- 右側：詳細情報 -->
            <div class="volume-info-detail">
                <div class="volume-title-row">
                    <h1 id="volume-title" class="volume-title-main">読み込み中...</h1>
                    <span id="volume-number" class="volume-number-display">-</span>
                </div>

                <div class="volume-meta">
                    <div class="meta-item">
                        <span class="meta-label">著者：</span>
                        <a href="#" id="volume-author" class="meta-value author-link">-</a>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">出版社：</span>
                        <span id="volume-publisher" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">レーベル：</span>
                        <span id="volume-label" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">発売日：</span>
                        <span id="volume-date" class="meta-value">-</span>
                    </div>

                    <div class="meta-item">
                        <span class="meta-label">価格：</span>
                        <span id="volume-price" class="meta-value">-</span>
                    </div>
                </div>

                <div class="volume-description">
                    <h2>この巻について</h2>
                    <p id="volume-synopsis">読み込み中...</p>
                </div>

                <div class="volume-buttons">
                    <a href="#" id="buy-rakuten" class="buy-button rakuten-button" target="_blank">
                        楽天で購入
                    </a>
                    <a href="#" id="buy-amazon" class="buy-button amazon-button" target="_blank">
                        Amazonで購入
                    </a>
                </div>

                <div class="navigation-buttons">
                    <a href="#" id="back-to-series" class="nav-button">← 作品ページに戻る</a>
                    <a href="index.html" class="nav-button">トップページに戻る</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
