<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード - ATLAS COMIC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="ATLAS COMIC のQRコード。スマホで読み取ってアクセスできます。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script defer src="https://unpkg.com/@phosphor-icons/web@2.1.2"></script>
    <style>
        body {
            background: #fff;
            min-height: 100vh;
        }
        .qr-main {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .qr-heading {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.04em;
            color: #2B2B2B;
            margin: 0 0 8px;
        }
        .qr-sub {
            font-size: 14px;
            color: #888;
            margin: 0 0 32px;
            line-height: 1.7;
        }
        .qr-card {
            background: #fff;
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 18px 50px rgba(75, 44, 130, 0.18),
                        0 4px 14px rgba(0, 0, 0, 0.06);
        }
        .qr-card img {
            display: block;
            width: 260px;
            height: 260px;
            max-width: 70vw;
            max-height: 70vw;
            border-radius: 12px;
        }
        .qr-url {
            margin-top: 28px;
            font-size: 14px;
            font-weight: 500;
            color: #4B2C82;
            word-break: break-all;
        }
        .qr-copy-btn {
            margin-top: 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            border: none;
            border-radius: 999px;
            background: #4B2C82;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }
        .qr-copy-btn:hover {
            background: #371F63;
        }
        .qr-copy-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="home.html" class="header-logo"><img src="logo.png" alt="ATLAS COMIC" class="header-logo-img"></a>
            <h1><a href="home.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Pickup</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="follow.html" class="nav-link follow-link">Favs</a>
                <button class="nav-menu-btn" id="navMenuBtn"><svg viewBox="0 0 320 512" class="nav-caret" aria-hidden="true"><path d="M137.4 374.6c12.5 12.5 32.8 12.5 45.3 0l128-128c9.2-9.2 11.9-22.9 6.9-34.9s-16.6-19.8-29.6-19.8L32 192c-12.9 0-24.6 7.8-29.6 19.8s-2.2 25.7 6.9 34.9l128 128z"/></svg></button>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="qr-main">
        <h1 class="qr-heading">QRコード</h1>
        <p class="qr-sub">スマホのカメラで読み取って<br>ATLAS COMIC にアクセスできます。</p>

        <div class="qr-card">
            <img src="qr-code.png" alt="ATLAS COMIC QRコード">
        </div>

        <div class="qr-url" id="qrUrl">https://manga-site-three.vercel.app</div>
        <button class="qr-copy-btn" id="qrCopyBtn">
            <i class="bi bi-link-45deg" style="font-size:18px"></i>
            <span>URLをコピー</span>
        </button>
    </main>

    <nav class="bottom-nav">
        <a href="javascript:history.back()" class="bottom-nav-item" data-page="back">
            <i class="ph-light ph-arrow-left" style="font-size:22px"></i>
            <span>Back</span>
        </a>
        <a href="/home.html" class="bottom-nav-item" data-page="database">
            <i class="ph-light ph-house" style="font-size:22px"></i>
            <span>Home</span>
        </a>
        <a href="/index.html" class="bottom-nav-item" data-page="home">
            <i class="ph-light ph-fire" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-light ph-butterfly" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
        <a href="/menu.html" class="bottom-nav-item active" data-page="menu">
            <i class="ph-light ph-list" style="font-size:22px"></i>
            <span>Menu</span>
        </a>
    </nav>

    <script>
    (function() {
        var url = 'https://manga-site-three.vercel.app';
        var btn = document.getElementById('qrCopyBtn');
        var label = btn.querySelector('span');
        btn.addEventListener('click', function() {
            navigator.clipboard.writeText(url).then(function() {
                label.textContent = 'コピーしました';
                setTimeout(function() { label.textContent = 'URLをコピー'; }, 1800);
            }).catch(function() {
                label.textContent = 'コピーできません';
                setTimeout(function() { label.textContent = 'URLをコピー'; }, 1800);
            });
        });
    })();
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
    <script src="swipe-back.js"></script>
    <script src="nav-menu.js"></script>
</body>
</html>
