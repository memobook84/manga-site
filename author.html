<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>著者詳細 - THE MANGA STORE</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="author.css">
    <script src="manga-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="author.js"></script>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <h1><a href="index.html" style="color: white; text-decoration: none;">THE MANGA STORE</a></h1>
            <nav class="header-nav">
                <a href="new-releases.html" class="nav-link">New Release</a>
                <a href="follow.html" class="nav-link follow-link">Follow</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 著者詳細ページコンテンツ -->
    <main class="author-main">
        <!-- 著者情報セクション -->
        <div class="author-info-section">
            <div class="author-header">
                <h1 id="author-name" class="author-name">読み込み中...</h1>
                <p id="author-description" class="author-description"></p>
                <div class="author-meta">
                    <span id="author-works-count" class="works-count">-</span>
                </div>
            </div>

            <div class="author-profile">
                <h2>プロフィール</h2>
                <p id="author-bio">読み込み中...</p>
            </div>

            <div class="author-representative">
                <h2>代表作品</h2>
                <ul id="representative-works">
                    <!-- JavaScriptで動的に生成 -->
                </ul>
            </div>
        </div>

        <!-- この著者の作品一覧 -->
        <div class="author-works-section">
            <h2 class="section-title">この著者の作品</h2>
            <div id="author-works-grid" class="author-works-grid">
                <!-- JavaScriptで動的に生成 -->
            </div>
        </div>

        <div class="back-button-container">
            <a href="index.html" class="back-button">← トップページに戻る</a>
        </div>
    </main>
</body>
</html>
