<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>著者詳細 - ATLAS COMIC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="description" content="著者の作品一覧 - ATLAS COMIC。この著者の全作品をまとめてチェックできます。">
    <!-- OGP -->
    <meta property="og:type" content="profile">
    <meta property="og:site_name" content="ATLAS COMIC">
    <meta property="og:title" content="著者詳細 - ATLAS COMIC">
    <meta property="og:description" content="著者の作品一覧 - ATLAS COMIC。この著者の全作品をまとめてチェックできます。">
    <meta property="og:url" content="https://manga-site-three.vercel.app/author.html">
    <meta property="og:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="著者詳細 - ATLAS COMIC">
    <meta name="twitter:description" content="著者の作品一覧 - ATLAS COMIC。この著者の全作品をまとめてチェックできます。">
    <meta name="twitter:image" content="https://manga-site-three.vercel.app/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Michroma&family=Montserrat:wght@700;900&family=Barlow:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="legal.css">
    <link rel="stylesheet" href="author.css">
    <script src="manga-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="author.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="favicon.png" alt="ATLAS COMIC" class="header-logo-img"></a>
            <h1><a href="index.html">ATLAS COMIC</a></h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Pickup</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="database.html" class="nav-link">DB</a>
                <a href="ranking.html" class="nav-link">Popular</a>
                <a href="follow.html" class="nav-link follow-link">Favs</a>
                <a href="profile.html" class="nav-link profile-link">About Me</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search manga...">
                <button class="search-icon" aria-label="検索">
                    <i class="ph-bold ph-magnifying-glass" style="font-size:20px"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 著者詳細ページコンテンツ -->
    <main class="author-main">
        <!-- 著者情報セクション -->
        <div class="author-info-section">
            <div class="author-header">
                <h1 id="author-name" class="author-name">読み込み中...</h1>
                <p id="author-description" class="author-description"></p>
                <div class="author-meta">
                    <span id="author-works-count" class="works-count">-</span>
                </div>
            </div>

            <div class="author-profile">
                <h2>プロフィール</h2>
                <p id="author-bio">読み込み中...</p>
            </div>

            <div class="author-representative">
                <h2>代表作品</h2>
                <ul id="representative-works">
                    <!-- JavaScriptで動的に生成 -->
                </ul>
            </div>
        </div>

        <!-- この著者の作品一覧 -->
        <div class="author-works-section">
            <h2 class="section-title">この著者の作品</h2>
            <div id="author-works-grid" class="author-works-grid">
                <!-- JavaScriptで動的に生成 -->
            </div>
        </div>

        <div class="back-button-container">
            <a href="home.html" class="back-button">← トップページに戻る</a>
        </div>
    </main>

    <!-- サイトフッター -->
    <div class="site-footer">
        <a href="privacy.html">プライバシーポリシー</a>
        <span class="footer-sep">|</span>
        <a href="about.html">運営者情報</a>
        <span class="footer-sep">|</span>
        <a href="profile.html">管理人紹介</a>
    </div>

    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="/home.html" class="bottom-nav-item" data-page="home">
            <i class="ph-bold ph-star" style="font-size:22px"></i>
            <span>Pickup</span>
        </a>
        <a href="/blog.html" class="bottom-nav-item" data-page="blog">
            <i class="ph-bold ph-article" style="font-size:22px"></i>
            <span>Blog</span>
        </a>
        <a href="/database.html" class="bottom-nav-item" data-page="database">
            <i class="ph-bold ph-database" style="font-size:22px"></i>
            <span>Database</span>
        </a>
        <a href="/ranking.html" class="bottom-nav-item" data-page="ranking">
            <i class="ph-bold ph-trophy" style="font-size:22px"></i>
            <span>Popular</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <i class="ph-bold ph-heart" style="font-size:22px"></i>
            <span>Favorites</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html')) ||
                (page === 'database' && path.includes('database')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'blog' && path.includes('blog')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
</body>
</html>
